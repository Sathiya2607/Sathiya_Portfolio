<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sathiya M — Full Stack Developer</title>
    <meta name="description"
        content="Full Stack Developer · PHP Laravel · CodeIgniter · React.js · Tamil Nadu Government e-Governance Projects" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ── RESET & ROOT ─────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --g50: #f0fdf4;
            --g100: #dcfce7;
            --g200: #bbf7d0;
            --g300: #86efac;
            --g400: #4ade80;
            --g500: #22c55e;
            --g600: #16a34a;
            --g700: #15803d;
            --g800: #166534;
            --g900: #14532d;
            --dark: #030a06;
            --dark2: #060f08;
            --dark3: #0a1a0d;
            --card: #0d1f11;
            --card2: #111f14;
            --card3: #152619;
            --border: rgba(34, 197, 94, .12);
            --border2: rgba(34, 197, 94, .25);
            --border3: rgba(34, 197, 94, .45);
            --text: #e8f5ea;
            --muted: #6b9e77;
            --faint: #3a5c42;
            --sans: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 14px;
            --radius-sm: 8px;
            --radius-lg: 20px;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px
        }

        body {
            font-family: var(--sans);
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.7
        }

        ::selection {
            background: var(--g600);
            color: #fff
        }

        ::-webkit-scrollbar {
            width: 3px
        }

        ::-webkit-scrollbar-track {
            background: var(--dark)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--g600);
            border-radius: 2px
        }

        /* ── ANIMATIONS ─────────────────────────────────────────────── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .5;
                transform: scale(.95)
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%)
            }

            100% {
                transform: translateX(100%)
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(34, 197, 94, .2)
            }

            50% {
                box-shadow: 0 0 40px rgba(34, 197, 94, .4)
            }
        }

        @keyframes lineGrow {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: .7
            }

            50% {
                transform: translateY(-20px) translateX(10px);
                opacity: .3
            }

            100% {
                transform: translateY(0) translateX(0);
                opacity: .7
            }
        }

        .fade-up {
            animation: fadeUp .7s ease both
        }

        .fade-in {
            animation: fadeIn .6s ease both
        }

        /* ── NAV ─────────────────────────────────────────────────────── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(1.5rem, 4vw, 3rem);
            background: rgba(3, 10, 6, .8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: background .3s;
        }

        .nav.scrolled {
            background: rgba(3, 10, 6, .95)
        }

        .nav-logo {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--g400);
            letter-spacing: .05em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--g500);
            animation: pulse 2s infinite;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            list-style: none
        }

        .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: .03em;
            transition: color .2s;
            position: relative;
            padding-bottom: 2px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--g400);
            transition: width .3s;
        }

        .nav-links a:hover {
            color: var(--g400)
        }

        .nav-links a:hover::after {
            width: 100%
        }

        .nav-btns {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-resume {
            font-size: 13px;
            font-weight: 600;
            padding: 9px 20px;
            border: 1px solid var(--border2);
            color: var(--g300);
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--sans);
            transition: all .2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .nav-resume:hover {
            border-color: var(--border3);
            background: rgba(34, 197, 94, .07);
            color: var(--g400);
        }

        .nav-hire {
            font-size: 13px;
            font-weight: 600;
            padding: 9px 22px;
            border: 1px solid var(--g600);
            color: var(--g400);
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--sans);
            transition: all .2s;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .nav-hire::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--g600);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .25s;
            z-index: -1;
        }

        .nav-hire:hover {
            color: #fff;
            border-color: var(--g600)
        }

        .nav-hire:hover::before {
            transform: scaleX(1)
        }

        /* ── HERO ─────────────────────────────────────────────────────── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 80px clamp(1.5rem, 4vw, 3rem) 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(34, 197, 94, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 197, 94, .04) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        .hero-radial {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(22, 163, 74, .1) 0%, transparent 65%);
        }

        .hero-radial2 {
            position: absolute;
            bottom: -300px;
            left: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 197, 94, .06) 0%, transparent 65%);
        }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--g400);
            background: rgba(34, 197, 94, .07);
            border: 1px solid var(--border2);
            padding: 7px 16px;
            border-radius: 100px;
            margin-bottom: 1.75rem;
            animation: fadeUp .5s .1s ease both;
        }

        .hero-badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--g400);
            animation: pulse 1.5s infinite
        }

        .hero-name {
            font-size: clamp(3.2rem, 6vw, 6rem);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -.04em;
            color: #fff;
            margin-bottom: .5rem;
            animation: fadeUp .6s .2s ease both;
        }

        .hero-name-accent {
            color: transparent;
            -webkit-text-stroke: 2px var(--g500);
        }

        .hero-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            animation: fadeUp .6s .3s ease both;
        }

        .hero-title {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted);
            font-weight: 400
        }

        .hero-title-sep {
            width: 32px;
            height: 1px;
            background: var(--border2)
        }

        .hero-title-loc {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--faint)
        }

        .hero-desc {
            font-size: 17px;
            color: var(--muted);
            line-height: 1.85;
            max-width: 500px;
            margin-bottom: 2.5rem;
            animation: fadeUp .6s .4s ease both;
        }

        .hero-desc em {
            color: var(--g300);
            font-style: normal;
            font-weight: 500
        }

        .hero-btns {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            animation: fadeUp .6s .5s ease both
        }

        .btn-pri {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 14px 30px;
            background: var(--g600);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--sans);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }

        .btn-pri::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .1), transparent);
            transition: left .5s;
        }

        .btn-pri:hover::after {
            left: 100%
        }

        .btn-pri:hover {
            background: var(--g700);
            transform: translateY(-2px)
        }

        .btn-sec {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 13px 28px;
            background: transparent;
            color: var(--g400);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--sans);
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-sec:hover {
            background: rgba(34, 197, 94, .07);
            border-color: var(--border3);
            transform: translateY(-2px)
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            animation: fadeUp .6s .6s ease both;
        }

        .metric-val {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--g400);
            line-height: 1;
            margin-bottom: 4px;
            font-family: var(--mono);
        }

        .metric-label {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
            font-weight: 400
        }

        /* Terminal card */
        .terminal {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);
            overflow: hidden;
            animation: fadeUp .7s .3s ease both, glow 3s ease infinite;
            font-family: var(--mono);
        }

        .terminal-bar {
            background: var(--card2);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tb-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%
        }

        .tb-dot.r {
            background: #ff5f57
        }

        .tb-dot.y {
            background: #febc2e
        }

        .tb-dot.g {
            background: #28c840
        }

        .tb-title {
            font-size: 12px;
            color: var(--faint);
            margin-left: 8px;
            letter-spacing: .05em
        }

        .terminal-body {
            padding: 1.75rem;
            font-size: 13px;
            line-height: 2.1
        }

        .tl-comment {
            color: #3a6645
        }

        .tl-key {
            color: var(--g300);
            font-weight: 500
        }

        .tl-str {
            color: #fbbf24
        }

        .tl-num {
            color: var(--g400);
            font-weight: 600
        }

        .tl-arr {
            color: var(--muted)
        }

        .tl-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--g400);
            vertical-align: middle;
            margin-left: 2px;
            animation: blink 1.1s step-end infinite;
        }

        .terminal-skills {
            margin-top: .5rem;
            padding: 1rem;
            background: rgba(34, 197, 94, .04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .ts-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px
        }

        .ts-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: rgba(34, 197, 94, .1);
            border: 1px solid var(--border);
            color: var(--g300);
            font-family: var(--mono);
        }

        /* ── SECTION COMMON ─────────────────────────────────────────── */
        .section {
            padding: 5.5rem clamp(1.5rem, 4vw, 3rem)
        }

        .section.dark {
            background: var(--card)
        }

        .container {
            max-width: 1200px;
            margin: 0 auto
        }

        .section-kicker {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--g500);
            letter-spacing: .14em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: .75rem;
        }

        .section-kicker::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--g600)
        }

        .section-h {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: -.03em;
            line-height: 1.15;
            margin-bottom: 3rem;
        }

        .section-h .dim {
            color: var(--faint);
            font-weight: 300
        }

        /* reveal animation */
        .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity .65s ease, transform .65s ease
        }

        .reveal.vis {
            opacity: 1;
            transform: translateY(0)
        }

        .reveal-l {
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity .65s ease, transform .65s ease
        }

        .reveal-l.vis {
            opacity: 1;
            transform: translateX(0)
        }

        .reveal-r {
            opacity: 0;
            transform: translateX(30px);
            transition: opacity .65s ease, transform .65s ease
        }

        .reveal-r.vis {
            opacity: 1;
            transform: translateX(0)
        }

        /* ── ABOUT ─────────────────────────────────────────────────── */
        .about-grid {
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: 4rem;
            align-items: start
        }

        .about-text p {
            font-size: 15.5px;
            color: var(--muted);
            line-height: 1.9;
            margin-bottom: 1.25rem
        }

        .about-text em {
            color: var(--g300);
            font-style: normal;
            font-weight: 500
        }

        .about-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 2rem
        }

        .ai-row {
            display: flex;
            gap: 14px;
            font-size: 14px;
            align-items: flex-start
        }

        .ai-key {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--g500);
            min-width: 110px;
            padding-top: 3px;
            letter-spacing: .04em;
        }

        .ai-val {
            color: var(--text);
            line-height: 1.5
        }

        .about-card {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: sticky;
            top: 90px;
        }

        .avatar {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 2px solid var(--g600);
            background: var(--g900);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: var(--g300);
            margin-bottom: 1.5rem;
            font-family: var(--mono);
            animation: float 4s ease-in-out infinite;
        }

        .ac-name {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 3px
        }

        .ac-role {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--g500);
            margin-bottom: 1.5rem
        }

        .ac-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 1.75rem
        }

        .ac-tag {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(34, 197, 94, .08);
            border: 1px solid var(--border);
            color: var(--g300);
            font-family: var(--mono);
        }

        .ac-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.5rem
        }

        .ac-domain {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
        }

        .ac-domain:last-child {
            border: none;
            padding-bottom: 0
        }

        .ac-domain::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--g600);
            flex-shrink: 0;
        }

        /* ── SKILLS ─────────────────────────────────────────────────── */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem
        }

        .skill-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: all .25s;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(34, 197, 94, .04) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .3s;
        }

        .skill-card:hover {
            border-color: var(--border2);
            transform: translateY(-3px)
        }

        .skill-card:hover::before {
            opacity: 1
        }

        .skill-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.25rem;
        }

        .skill-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(34, 197, 94, .1);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--g400);
            font-weight: 600;
        }

        .skill-cat-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--g300);
            font-family: var(--mono)
        }

        .skill-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px
        }

        .skill-pill {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 6px;
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            transition: all .15s;
            cursor: default;
        }

        .skill-pill:hover {
            border-color: var(--g500);
            color: var(--g400)
        }

        .skill-pill.hi {
            background: rgba(34, 197, 94, .1);

        function useReveal() {
            useEffect(() => {
                const obs = new IntersectionObserver(entries => {
                    entries.forEach((e, i) => {
                        if (e.isIntersecting) {
                            setTimeout(() => e.target.classList.add('vis'), i * 90);
                        }
                    });
                }, { threshold: 0.12 });
                document.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => obs.observe(el));
                return () => obs.disconnect();
            }, []);
        }

        function useActiveSection() {
            const [active, setActive] = useState('hero');
            useEffect(() => {
                const secs = ['hero', 'about', 'skills', 'experience', 'projects', 'achievements', 'contact'];
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
                }, { threshold: 0.4 });
                secs.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
                return () => obs.disconnect();
            }, []);
            return active;
        }

        function useScrolled() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const fn = () => setScrolled(window.scrollY > 40);
                window.addEventListener('scroll', fn, { passive: true });
                return () => window.removeEventListener('scroll', fn);
            }, []);
            return scrolled;
        }

        /* Self-contained reveal wrapper: each card watches itself, so it
           still works correctly even if it gets re-rendered later (e.g.
           project filter buttons, or React re-rendering the list). Once
           visible it disconnects its own observer and stays visible. */
        function RevealItem({ tag: Tag = 'div', className = '', style, delay = 0, children, ...rest }) {
            const ref = useRef(null);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                // If already on-screen at mount time, reveal immediately.
                const rect = el.getBoundingClientRect();
                const alreadyVisible = rect.top < (window.innerHeight || 800) * 0.92 && rect.bottom > 0;
                if (alreadyVisible) {
                    setTimeout(() => el.classList.add('vis'), delay);
                    return;
                }
                const obs = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => el.classList.add('vis'), delay);
                        obs.disconnect();
                    }
                }, { threshold: 0.12 });
                obs.observe(el);
                return () => obs.disconnect();
            }, [delay]);
            return <Tag ref={ref} className={`reveal ${className}`} style={style} {...rest}>{children}</Tag>;
        }

        /* ── CONTACT ─────────────────────────────────────────────── */
        function Contact() {
            const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });
            const [errors, setErrors] = useState({});
            const [status, setStatus] = useState(null); // null | 'sending' | 'ok' | 'err'

            const set = (k, v) => {
                setForm(f => ({ ...f, [k]: v }));
                if (errors[k]) setErrors(er => ({ ...er, [k]: null }));
            };

            const validate = () => {
                const er = {};
                if (!form.name.trim()) er.name = "Name is required";
                if (!form.email.trim()) er.email = "Email is required";
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) er.email = "Enter a valid email";
                if (!form.subject.trim()) er.subject = "Subject is required";
                if (!form.message.trim()) er.message = "Message is required";
                else if (form.message.trim().length < 10) er.message = "Message is too short (min 10 characters)";
                return er;
            };

            const submit = async e => {
                e.preventDefault();
                const er = validate();
                setErrors(er);
                if (Object.keys(er).length > 0) { setStatus(null); return; }

                setStatus('sending');
                try {
                    await sendEmail(form);
                    setStatus('ok');
                    setForm({ name: '', email: '', subject: '', message: '' });
                    setErrors({});
                } catch {
                    setStatus('err');
                }
            };

            return (

                                <div className="c-links">
